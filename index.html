        <label for="email"><b>E-mail</b></label><br />
        <input type="email" id="email" placeholder="masukkan email" required/><br />
        <label for="regdate"><b>tanggal lahir</b></label><br />
        <input type="date" id="regdate" required/><br />
        <button type="button" onclick="daftar()"><b>DAFTAR</b></button><br />

      </form>
